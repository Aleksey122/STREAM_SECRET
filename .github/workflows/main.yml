name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-setuptools
          pip3 install --upgrade buildozer
      - name: Build with Buildozer
        run: |
          buildozer clean
          buildozer android debug
