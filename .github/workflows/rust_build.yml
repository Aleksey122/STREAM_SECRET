name: Rust Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup target add aarch64-linux-android
      - name: Build
        run: |
          # Находим папку, где лежит Cargo.toml
          PROJECT_DIR=$(find . -name Cargo.toml -exec dirname {} \;)
          echo "Building in $PROJECT_DIR"
          cargo build --release --target aarch64-linux-android --manifest-path $PROJECT_DIR/Cargo.toml
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: librust_core
          path: '**/librust_core.so'
