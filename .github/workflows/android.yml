name: Android Build

on:
  push:
    branches: [ feature/webview-ui ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
