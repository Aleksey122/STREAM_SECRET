name: Android Build

on:
  push:
    branches: [ feature/webview-ui ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Build with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug --stacktrace
