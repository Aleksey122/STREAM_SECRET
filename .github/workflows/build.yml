name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: stable
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: bin/*.apk
