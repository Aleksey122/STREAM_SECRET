name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip install buildozer cython

      - name: Patch buildozer root check
        run: |
          find / -path '*/buildozer/__init__.py' 2>/dev/null | xargs -I{} sed -i "s/cont = input.*/cont = 'y'/" {}

      - name: Build APK
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
