name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        run: |
          docker run --rm -v $(pwd):/home/user/host \
            -e BUILDOZER_ALLOW_ROOT=1 \
            kivy/buildozer \
            /bin/bash -c "sed -i 's/cont = input.*/cont = \"y\"/' /home/user/.venv/lib/python3.14/site-packages/buildozer/__init__.py && buildozer android debug"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
