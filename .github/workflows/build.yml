name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: |
          # Принудительно отключаем поиск SDK в интерактивном режиме
          # и даем разрешение на использование root
          buildozer --verbose android debug
