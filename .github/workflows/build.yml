name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip openjdk-17-jdk
          pip3 install buildozer cython
      - name: Build APK
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: bin/*.apk
