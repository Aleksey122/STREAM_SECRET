name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          docker run --rm -v $(pwd):/home/user/host -w /home/user/host -e BUILDOZER_ALLOW_ROOT=1 kivy/buildozer /bin/bash -c "sed -i \"s/cont = input.*/cont = 'y'/\" \$(find / -path '*/buildozer/__init__.py' 2>/dev/null | head -1) && buildozer android debug"
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
