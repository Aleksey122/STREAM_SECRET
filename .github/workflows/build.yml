name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython

      - name: Patch buildozer
        run: |
          python3 -c "
          import glob
          for f in glob.glob('/opt/hostedtoolcache/Python/3.11*/x64/lib/python3.11/site-packages/buildozer/__init__.py') + glob.glob('/usr/local/lib/python*/dist-packages/buildozer/__init__.py') + glob.glob('/home/runner/.local/lib/python*/site-packages/buildozer/__init__.py'):
              txt = open(f).read()
              if \"cont = input(\" in txt:
                  txt = txt.replace(\"cont = input('Are you sure you want to continue [y/n]? ')\", \"cont = 'y'\")
                  open(f,'w').write(txt)
                  print('Patched:', f)
          "
          find / -path '*/buildozer/__init__.py' 2>/dev/null | xargs grep -l "cont = input" | xargs -I{} sed -i "s/cont = input.*/cont = 'y'/" {}

      - name: Build APK
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
