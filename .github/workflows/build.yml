name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        uses: mathijsvanderbijl/buildozer-action@v0.2
        with:
          args: android debug
        env:
          # Это единственный способ гарантированно принять все лицензии
          ANDROID_ACCEPT_SDK_LICENSE: "True"
