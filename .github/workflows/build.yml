name: Build APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          docker run --rm -v $(pwd):/home/user/host -w /home/user/host -e BUILDOZER_ALLOW_ROOT=1 kivy/buildozer /bin/bash patch_and_build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
