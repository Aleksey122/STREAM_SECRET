name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          docker run --rm \
            -v $(pwd):/home/user/host \
            -w /home/user/host \
            -e BUILDOZER_ALLOW_ROOT=1 \
            kivy/buildozer \
            /bin/bash -c "
              python3 - << 'PYEOF'
import re, glob
files = glob.glob('/home/user/.venv/lib/python*/site-packages/buildozer/__init__.py')
for f in files:
    txt = open(f).read()
    txt = txt.replace(\"cont = input('Are you sure you want to continue [y/n]? ')\", \"cont = 'y'\")
    open(f, 'w').write(txt)
    print('Patched:', f)
PYEOF
              buildozer android debug
            "
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
