name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        run: |
          docker run --rm \
            -v $(pwd):/home/user/host \
            -e BUILDOZER_ALLOW_ROOT=1 \
            -w /home/user/host \
            kivy/buildozer \
            /bin/bash -c "
              python3 -c \"
import buildozer
import unittest.mock as mock
import builtins
real_input = builtins.input
builtins.input = lambda *a, **k: 'y'
\" 2>/dev/null || true
              find / -name '__init__.py' -path '*/buildozer/*' 2>/dev/null | head -1 | xargs -I{} sed -i 's/cont = input(/cont = (lambda: \"y\")(/g' {}
              buildozer android debug
            "
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
